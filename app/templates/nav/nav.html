<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/nav/nav.css') }}"
    />
    <!-- 구글폰트 -->
    <link
      href="https://fonts.googleapis.com/css?family=Stylish&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header class="navbar" role="banner">
      <div class="navbar__container">
        <div class="navbar__left">
          <a href="" class="navbar__Home">Mini-Jira</a>
          <nav id="navbarMenu" class="navbar__menu">
            <ul class="navbar__list">
              <li class="navbar__Calendar">📅 Calendar</li>
              <li class="navbar__Status">📑 Status</li>
            </ul>
          </nav>
        </div>

        <div class="navbar__right">
          <a
            href="{{ url_for('issue.create_issue', project_id=selected_project_id) }}"
            class="navbar__issue navbar__issue--cta"
            >Create issue</a
          >
          <div class="navbar__profile" data-username="{{username}}">
            <span id="navbarUserInitial" class="navbar__profileInitial"></span>
          </div>
        </div>
      </div>
    </header>

    <div class="modal" id="profileModal" tabindex="-1" data-bs-backdrop="false">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">내 프로필</h5>
            <button type="button" class="btn-close" id="closeModalBtn"></button>
          </div>
          <div class="modal-body text-center">
            <p id="data-username" class="fs-5 fw-bold"></p>

            <p class="text-muted" style="text-align: left; margin-top: 15px">
              프로젝트 선택
            </p>

            <div>
              {% for project in projects %}
              <a
                href="{{ url_for('calendar.calendar_view', project_id=project._id) }}"
                class="btn {{'btn-primary' if project._id|string == selected_project_id|string else 'btn-outline-primary'}} btn-sm"
              >
                {{ project.name }}
              </a>
              {% endfor %}
            </div>

            <hr />

            <form
              action="{{ url_for('project.create_project') }}"
              method="POST"
              class="mb-3"
            >
              <p class="text-muted" style="text-align: left">
                새 프로젝트 추가
              </p>
              <div class="input-group">
                <input
                  type="text"
                  name="name"
                  class="form-control"
                  placeholder="예: 1주차 프로젝트"
                  required
                />
                <button type="submit" class="btn btn-success">추가</button>
              </div>
            </form>

            <hr />
            {% if selected_project_id %}
            <form
              action="{{ url_for('project.invite', project_id=selected_project_id) }}"
              method="POST"
            >
              <p class="text-muted" style="text-align: left">
                팀원 초대 (이메일)
              </p>
              <div class="input-group">
                <input
                  type="email"
                  name="email"
                  class="form-control"
                  placeholder="team@example.com"
                  required
                />
                <button type="submit" class="btn btn-primary">초대</button>
              </div>
            </form>
            {% endif %}
          </div>
          <div class="modal-footer">
            <form method="POST" action="{{ url_for('auth.logout') }}">
              <button type="submit" class="btn btn-danger w-100">
                로그아웃
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const profileEl = document.querySelector(".navbar__profile");
        const profileModal = document.getElementById("profileModal");

        if (profileEl && profileModal) {
          const username = profileEl.getAttribute("data-username");

          profileEl.addEventListener("click", function (e) {
            e.stopPropagation();
            const isModalOpen = profileModal.style.display === "block";

            if (isModalOpen) {
              profileModal.style.display = "none";
            } else {
              document.getElementById("data-username").textContent =
                username + " 님";
              const rect = profileEl.getBoundingClientRect();
              const modalWidth = 350;
              const margin = 50;

              profileModal.style.display = "block";
              profileModal.style.top = `${window.scrollY + rect.bottom + 10}px`;
              profileModal.style.left = `${window.innerWidth - modalWidth - margin}px`;
            }
          });
          document.addEventListener("click", function (e) {
            if (!profileModal.contains(e.target) && e.target !== profileEl) {
              profileModal.style.display = "none";
            }
          });
          document
            .getElementById("closeModalBtn")
            .addEventListener("click", () => {
              profileModal.style.display = "none";
            });
        }
      });
      document.addEventListener("DOMContentLoaded", function () {
        const profileEl = document.querySelector(".navbar__profile");
        const initialSpan = document.getElementById("navbarUserInitial");

        if (profileEl && initialSpan) {
          const username = profileEl.getAttribute("data-username");
          const initial = username.charAt(0).toUpperCase();
          initialSpan.textContent = initial;
        }
      });
    </script>
  </body>
</html>
