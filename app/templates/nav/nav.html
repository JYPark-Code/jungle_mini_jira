<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/nav/nav.css') }}" />
    <!-- 구글폰트 -->
    <link href="https://fonts.googleapis.com/css?family=Stylish&display=swap" rel="stylesheet" />
</head>

<body>
    <header class="navbar" role="banner">
        <div class="navbar__container">
            <div class="navbar__left">
                <a href="{{ url_for('calendar.calendar_view') }}" class="navbar__Home">Mini-Jira</a>
                <nav id="navbarMenu" class="navbar__menu">
                    <ul class="navbar__list">
                        <a class="navbar__Calendar" href="{{ url_for('calendar.calendar_view') }}">📅 Calendar</a>
                        <a class="navbar__Status" href="{{ url_for('calendar.status_view') }}">📑 Status</a>
                    </ul>
                </nav>
            </div>

            <div class="navbar__right">
                <button type="button" class="btn btn-primary btn-sm shadow-sm" data-bs-toggle="modal" data-bs-target="#modal">
                    <span class="me-1">+</span> Create issue
                </button>
                &nbsp;
                <div class="navbar__profile" data-username="{{username}}">
                    <span id="navbarUserInitial" class="navbar__profileInitial"></span>
                </div>
            </div>
        </div>
    </header>

    <div class="modal" id="profileModal" tabindex="-1" data-bs-backdrop="false">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">내 프로필</h5>
                    <button type="button" class="btn-close" id="closeModalBtn"></button>
                </div>
                <div class="modal-body text-center">
                    <p id="data-username" class="fs-5 fw-bold"></p>

                    <p class="text-muted" style="text-align: left; margin-top: 15px">프로젝트 선택</p>

                    <div class="d-flex flex-wrap gap-2 mb-3">
                        {% for project in projects %}
                        <button type="button"
                            class="btn navbar__projectBtn {{'btn-primary' if project._id|string == selected_project_id|string else 'btn-outline-primary'}} btn-sm"
                            title="{{ project.name | default('', true) }}"
                            data-calendar-url="{{ url_for('calendar.calendar_view', project_id=project._id) }}"
                            data-project-id="{{ project._id }}"
                            data-project-name="{{ project.name | default('', true) }}"
                            data-can-delete="{{ 'true' if project.owner_id|string == session.get('user_id', '')|string else 'false' }}"> <!-- 프로젝트 주인 == 세션 유저 id시 삭제 -->
                            {% set pname = project.name | default('', true) %}
                            {{ pname[:8] ~ '...' if pname|length > 8 else pname }}
                        </button>
                        {% endfor %}
                    </div>

                    <hr />

                    <form action="{{ url_for('project.create_project') }}" method="POST" class="mb-3">
                        <p class="text-muted" style="text-align: left">새 프로젝트 추가</p>
                        <div class="input-group">
                            <input type="text" name="name" class="form-control" placeholder="프로젝트 이름" required />
                            <button type="submit" class="btn btn-success">추가</button>
                        </div>
                    </form>

                    <hr />
                    <div class="mt-4">
                        <form action="{{ url_for('project.invite', project_id=selected_project_id) }}" method="POST">
                            <p class="text-muted" style="text-align: left">팀원 초대 (이메일)</p>
                            <div class="input-group">
                                <input type="email" name="email" class="form-control" placeholder="example@company.com"
                                    required />
                                <button type="submit" class="btn btn-primary">초대</button>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="modal-footer">
                    <form method="POST" action="{{ url_for('auth.logout') }}">
                        <button type="submit" class="btn btn-danger w-100">로그아웃</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- 프로젝트 열기 / 삭제 선택 모달 -->
    <div class="modal fade" id="projectActionModal" tabindex="-1" aria-labelledby="projectActionModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="projectActionModalLabel">프로젝트 작업</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="projectActionProjectName" class="fw-bold mb-2"></p>
                    <p class="text-muted mb-0">
                        선택한 프로젝트를 캘린더에서 열거나, 권한이 있는 경우 삭제할 수 있습니다.
                    </p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                    <button type="button" class="btn btn-danger" id="projectDeleteBtn">삭제</button>
                    <button type="button" class="btn btn-primary" id="projectOpenBtn">캘린더 열기</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5">업무 생성</h1>
                </div>
                <div class="modal-body">
                    <!-- Title -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">제목</label>
                        <input type="text" id="title" class="form-control" maxlength="15"
                            placeholder="Enter title (최대 15자리까지)" />
                        <div class="form-text">최대 15자리</div>
                    </div>

                    <!-- Description -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">설명</label>
                        <textarea class="form-control" id="description" rows="4" maxlength="200"
                            placeholder="Enter description (최대 200자리까지)"></textarea>
                        <div class="form-text">최대 200자리</div>
                    </div>

                    <!-- Start Date -->
                                        <div class="mb-3">
                                                <label class="form-label fw-bold">업무 시작 시간</label>
                                                <input type="datetime-local" class="form-control" id="startDate"
                            step="1" />
                                            </div>

                                        <!-- Due Date -->
                                        <div class="mb-3">
                                                <label class="form-label fw-bold">업무 종료 시간</label>
                                                <input type="datetime-local" class="form-control" id="dueDate"
                            step="1" />
                                            </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Close
                    </button>
                    <button type="button" onclick="saveIssue()" class="btn btn-primary">
                        Save
                    </button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="modal1" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header bg-info">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="alert alert-primary" role="alert" id="alert"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        let currentProjectAction = null;

        function openProjectOptions(calendarUrl, projectId, projectName, canDelete) {
            const modalEl = document.getElementById("projectActionModal");
            if (!modalEl) return;

            currentProjectAction = {
                calendarUrl,
                projectId,
                projectName,
                canDelete,
            };

            const nameEl = document.getElementById("projectActionProjectName");
            const deleteBtn = document.getElementById("projectDeleteBtn");

            if (nameEl) {
                nameEl.textContent = projectName || "";
            }

            if (deleteBtn) {
                if (canDelete) {
                    deleteBtn.disabled = false;
                    deleteBtn.classList.remove("btn-secondary");
                    deleteBtn.classList.add("btn-danger");
                } else {
                    deleteBtn.disabled = true;
                    deleteBtn.classList.remove("btn-danger");
                    deleteBtn.classList.add("btn-secondary");
                }
            }

            const modalInstance = new bootstrap.Modal(modalEl);
            modalInstance.show();
        }

        function confirmDelete(projectId, projectName) {
            if (
                confirm(
                    projectName +
                    " 프로젝트를 정말 삭제하시겠습니까?\n프로젝트 안의 모든 이슈도 함께 삭제됩니다."
                )
            ) {
                const form = document.createElement("form");
                form.method = "POST";
                form.action = "/projects/" + projectId + "/delete";
                document.body.appendChild(form);
                form.submit();
            }
        }

        document.addEventListener("DOMContentLoaded", function () {
            const profileEl = document.querySelector(".navbar__profile");
            const profileModal = document.getElementById("profileModal");

            if (profileEl && profileModal) {
                const username = profileEl.getAttribute("data-username");

                profileEl.addEventListener("click", function (e) {
                    e.stopPropagation();
                    const isModalOpen = profileModal.style.display === "block";

                    if (isModalOpen) {
                        profileModal.style.display = "none";
                    } else {
                        document.getElementById("data-username").textContent = username + " 님";
                        const rect = profileEl.getBoundingClientRect();
                        const modalWidth = 350;
                        const margin = 50;

                        profileModal.style.display = "block";
                        profileModal.style.top = `${window.scrollY + rect.bottom + 10}px`;
                        profileModal.style.left = `${window.innerWidth - modalWidth - margin}px`;
                    }
                });
                document.addEventListener("click", function (e) {
                    if (!profileModal.contains(e.target) && e.target !== profileEl) {
                        profileModal.style.display = "none";
                    }
                });
                document.getElementById("closeModalBtn").addEventListener("click", () => {
                    profileModal.style.display = "none";
                });
            }

            const initialSpan = document.getElementById("navbarUserInitial");
            if (profileEl && initialSpan) {
                const username = profileEl.getAttribute("data-username");
                const initial = username.charAt(0).toUpperCase();
                initialSpan.textContent = initial;
            }

            // 프로젝트 버튼 클릭 시 프로젝트 작업 모달 열기
            const projectButtons = document.querySelectorAll(".navbar__projectBtn");
            const deleteBtn = document.getElementById("projectDeleteBtn");
            const openBtn = document.getElementById("projectOpenBtn");

            projectButtons.forEach((btn) => {
                btn.addEventListener("click", function () {
                    const calendarUrl = this.dataset.calendarUrl;
                    const projectId = this.dataset.projectId;
                    const projectName = this.dataset.projectName || "";
                    const canDelete = this.dataset.canDelete === "true";

                    openProjectOptions(calendarUrl, projectId, projectName, canDelete);
                });
            });

            if (deleteBtn) {
                deleteBtn.addEventListener("click", function () {
                    if (!currentProjectAction || !currentProjectAction.canDelete) return;
                    confirmDelete(currentProjectAction.projectId, currentProjectAction.projectName);
                });
            }

            if (openBtn) {
                openBtn.addEventListener("click", function () {
                    if (!currentProjectAction || !currentProjectAction.calendarUrl) return;
                    window.location.href = currentProjectAction.calendarUrl;
                });
            }
        });

        const saveIssue = () => {
            let title = $("#title").val();
            let description = $("#description").val();
            let start_date = $("#startDate").val();
            let due_date = $("#dueDate").val();

            let urlStr = window.location.href;
            let url = new URL(urlStr);
            let urlParams = url.searchParams;
            let projectId = urlParams.get("project_id");
            projectId = "{{ selected_project_id }}";

            const tempData = {
                title: title,
                description: description,
                start_date: start_date || null,
                due_date: due_date,
            };

            $.ajax({
                url: "/api/projects/" + projectId + "/issues",
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify(tempData),

                success: function (res) {
                    $("#alert").addClass("alert-success").text(res.message);
                    new bootstrap.Modal($("#modal1")).show();

                    window.location.href = window.location.href;
                },

                error: function (err) {
                    $("#alert").addClass("alert-danger").text(err.responseJSON.message);
                    new bootstrap.Modal($("#modal1")).show();
                },
            });
        };
    </script>
</body>

</html>
