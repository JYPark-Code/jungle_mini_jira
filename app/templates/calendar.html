<!doctype html>
<html lang="ko">
  {% include "nav/nav.html" %}
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendar</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css?family=Stylish&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/calendar/main.css') }}"
    />

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/calendar/main.js') }}"></script>
  </head>
  <body>
    <div class="calendar container-fluid px-2 px-sm-3 py-2 py-md-3">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-2 mb-md-3">
        <div class="d-flex align-items-center gap-1">
          <button type="button" id="btnPrev" class="btn btn-outline-secondary btn-sm">◁</button>
          <span id="monthText" class="fw-semibold text-body"></span>
          <button type="button" id="btnNext" class="btn btn-outline-secondary btn-sm">▷</button>
        </div>
        <div class="d-flex flex-wrap gap-1">
          <button type="button" id="all" class="btn btn-outline-primary btn-sm">All</button>
          <button type="button" id="Todo" class="btn btn-outline-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modal">TO DO</button>
          <button type="button" class="btn btn-outline-primary btn-sm">In Progress</button>
          <button type="button" class="btn btn-outline-primary btn-sm">Done</button>
        </div>
      </div>

      <div id="calendar-weekday" class="calendar-weekday row g-1 g-sm-2 mb-1 mb-sm-2 text-center small fw-semibold text-muted">
        {% for w in weeks %}
        <div class="col">{{ w }}</div>
        {% endfor %}
      </div>
      <div id="calendar-days" class="calendar-days text-center"></div>
    </div>

    <div
      class="modal fade"
      id="modal-detailInfo"
      tabindex="-1"
      aria-labelledby="modalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header bg-info d-flex justify-content-between align-items-center">
            <h5 class="modal-title mb-0" id="modal-detailInfo-title"></h5>
            <div class="d-flex align-items-center gap-1">
              <button type="button" onclick="edit()" class="btn btn-primary btn-sm">
                수정
              </button>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
          </div>
          <div class="modal-body">
            <div class="d-flex flex-column gap-2 small">
              <div><strong>생성시간:</strong> <span id="modal-detailInfo-createdAt"></span></div>
              <div><strong>설명:</strong><div id="modal-detailInfo-description" class="border rounded p-2 bg-light mt-1"></div></div>
              <div><strong>상태:</strong> <span id="modal-detailInfo-status"></span></div>
              <div><strong>기한:</strong> <span id="modal-detailInfo-dueDate"></span></div>
              <div><strong>댓글:</strong><div id="modal-detailInfo-comment" class="border rounded p-2 bg-light mt-1"></div></div>
            </div>
          </div>
          <div class="modal-footer"></div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="modal1"
      tabindex="-1"
      aria-labelledby="modalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
          <div class="modal-header bg-info">
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div class="alert alert-primary" role="alert" id="alert"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      $(document).ready(() => {
        const t = new Date();
        const y = t.getFullYear();
        const m = t.getMonth() + 1;
        const d = t.getDate();
        const projectId = "{{ selected_project_id }}";
        calendar(y, m, d, projectId);
        btnPrev(projectId);
        btnNext(projectId);
        dateMin();
      });

      const save = () => {
        let title = $("#title").val();
        let description = $("#description").val();
        let due_date = $("#dueDate").val();

        let urlStr = window.location.href;
        let url = new URL(urlStr);
        let urlParams = url.searchParams;
        let projectId = urlParams.get("project_id");
        projectId = "{{ selected_project_id }}";

        const tempData = {
          title: title,
          description: description,
          due_date: due_date,
        };

        $.ajax({
          url: "/api/projects/" + projectId + "/issues",
          type: "POST",
          contentType: "application/json",
          data: JSON.stringify(tempData),

          success: function (res) {
            $("#alert").addClass("alert-success").text(res.message);
            new bootstrap.Modal($("#modal1")).show();

            window.location.href = window.location.href;
          },

          error: function (err) {
            $("#alert").addClass("alert-danger").text(err.responseJSON.message);
            new bootstrap.Modal($("#modal1")).show();
          },
        });
      };

      const edit = () => {
        window.location.href = `/api/issues/${issue_id}/edit`;
      };
    </script>
  </body>
</html>
